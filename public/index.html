<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Request | Kies Je Nummer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --neon-cyan: #00fff7;
      --neon-magenta: #ff00ff;
      --neon-purple: #b400ff;
      --neon-pink: #ff2d95;
      --neon-blue: #00b4ff;
      --neon-green: #39ff14;
      --party-gold: #ffd57a;
      --party-orange: #ff8a36;
      --party-red: #ff3d6c;
      --bg-dark: #0a0612;
      --bg-darker: #050308;
      --panel-bg: rgba(14, 8, 24, 0.86);
      --panel-border: rgba(255, 168, 76, 0.28);
      --text-primary: #fff5e8;
      --text-secondary: #d4bfa6;
      --text-dim: #8a7766;
    }

    html { scrollbar-width: thin; scrollbar-color: var(--neon-cyan) var(--bg-darker); }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Blurred band photo as fixed background */
    .bg-image {
      position: fixed; inset: 0;
      background-image: url('/images/band-bg.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(14px) saturate(1.1) brightness(0.55);
      transform: scale(1.08); /* hide blur edges */
      z-index: -2;
      pointer-events: none;
    }
    .bg-image::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(10, 6, 18, 0.45) 0%, rgba(10, 6, 18, 0.85) 70%),
        linear-gradient(180deg, rgba(10, 6, 18, 0.55) 0%, rgba(10, 6, 18, 0.78) 100%);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-darker); }
    ::-webkit-scrollbar-thumb { background: var(--party-orange); border-radius: 3px; }

    #particles {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
      opacity: 0.5;
    }

    /* Stage lighting glow on top of band photo */
    body::before {
      content: '';
      position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(255,180,80,0.10) 0%, transparent 45%),
        radial-gradient(ellipse at 80% 100%, rgba(255,41,96,0.06) 0%, transparent 45%),
        radial-gradient(ellipse at 20% 100%, rgba(180,0,255,0.05) 0%, transparent 55%);
      z-index: 0; pointer-events: none;
    }

    /* Animated spotlight beams from above (stage feel) */
    .stage-lights {
      position: fixed; inset: 0; pointer-events: none; z-index: 1;
      overflow: hidden; mix-blend-mode: screen;
    }
    .stage-lights .beam {
      position: absolute; top: -10%; left: 50%;
      width: 280px; height: 130%;
      transform-origin: top center;
      background: linear-gradient(180deg,
        rgba(255,122,26,0.18) 0%,
        rgba(255,122,26,0.05) 40%,
        transparent 75%);
      filter: blur(28px);
      opacity: 0.85;
    }
    .stage-lights .beam {
      opacity: 0.5;
    }
    .stage-lights .beam.b1 { animation: sweepA 9s ease-in-out infinite; }
    .stage-lights .beam.b2 {
      background: linear-gradient(180deg,
        rgba(255,41,96,0.10) 0%,
        rgba(255,41,96,0.03) 40%,
        transparent 75%);
      animation: sweepB 11s ease-in-out infinite;
    }
    .stage-lights .beam.b3 {
      background: linear-gradient(180deg,
        rgba(180,0,255,0.10) 0%,
        rgba(180,0,255,0.03) 40%,
        transparent 75%);
      animation: sweepC 13s ease-in-out infinite;
    }
    .stage-lights .beam.b4 {
      background: linear-gradient(180deg,
        rgba(255,210,74,0.10) 0%,
        rgba(255,210,74,0.03) 40%,
        transparent 75%);
      animation: sweepD 8s ease-in-out infinite;
    }
    @keyframes sweepA {
      0%,100% { transform: translateX(-30%) rotate(-22deg); }
      50% { transform: translateX(-10%) rotate(18deg); }
    }
    @keyframes sweepB {
      0%,100% { transform: translateX(15%) rotate(20deg); }
      50% { transform: translateX(-15%) rotate(-18deg); }
    }
    @keyframes sweepC {
      0%,100% { transform: translateX(-50%) rotate(8deg); }
      50% { transform: translateX(-50%) rotate(-12deg); }
    }
    @keyframes sweepD {
      0%,100% { transform: translateX(25%) rotate(-15deg); }
      50% { transform: translateX(40%) rotate(15deg); }
    }

    /* ===== COUNTDOWN TIMER BAR ===== */
    .timer-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(10, 10, 24, 0.95);
      border-bottom: 1px solid var(--neon-magenta);
      padding: 0.6rem 1.5rem;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      backdrop-filter: blur(10px);
    }

    .timer-bar.active { display: flex; }
    .timer-bar.expired { border-bottom-color: #ff3333; }

    .timer-bar .timer-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--neon-magenta);
      text-shadow: 0 0 10px rgba(255,0,255,0.5);
    }

    .timer-bar .timer-clock {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem; font-weight: 900;
      color: var(--neon-cyan);
      text-shadow: 0 0 15px rgba(0,255,247,0.6), 0 0 30px rgba(0,255,247,0.3);
      min-width: 80px; text-align: center;
    }

    .timer-bar.urgent .timer-clock {
      color: #ff3333;
      text-shadow: 0 0 15px rgba(255,50,50,0.8);
      animation: timerPulse 0.5s ease-in-out infinite alternate;
    }

    .timer-bar.expired .timer-label { color: #ff3333; }
    .timer-bar.expired .timer-clock {
      color: #ff3333;
      text-shadow: 0 0 15px rgba(255,50,50,0.8);
    }

    @keyframes timerPulse {
      from { opacity: 0.6; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1.05); }
    }

    .timer-progress {
      position: absolute; bottom: 0; left: 0; height: 2px;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
      transition: width 1s linear;
    }

    /* ===== HEADER ===== */
    header {
      position: relative; z-index: 10;
      text-align: center; padding: 2rem 1rem 0.5rem;
    }

    .timer-bar.active ~ header { padding-top: 4rem; }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase;
      background: linear-gradient(135deg, var(--party-gold), var(--party-orange), var(--party-red), var(--neon-magenta));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 30px rgba(255,122,26,0.4));
      animation: logoGlow 4s ease-in-out infinite alternate;
    }

    @keyframes logoGlow {
      0% { filter: drop-shadow(0 0 20px rgba(255,210,74,0.4)); }
      50% { filter: drop-shadow(0 0 40px rgba(255,41,96,0.5)); }
      100% { filter: drop-shadow(0 0 20px rgba(180,0,255,0.4)); }
    }

    .subtitle {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem; color: var(--text-secondary);
      letter-spacing: 0.4em; text-transform: uppercase; margin-top: 0.3rem;
    }

    /* ===== VOTE COUNTER ===== */
    .vote-counter {
      display: inline-flex; align-items: center; gap: 0.5rem;
      margin-top: 0.6rem; padding: 0.4rem 1.2rem;
      background: rgba(255,0,255,0.08);
      border: 1px solid rgba(255,0,255,0.25);
      border-radius: 20px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem; font-weight: 600;
      color: var(--neon-magenta);
      text-shadow: 0 0 10px rgba(255,0,255,0.4);
    }

    .vote-counter .hearts {
      display: flex; gap: 3px; font-size: 0.9rem;
    }

    .vote-counter .heart { opacity: 0.2; transition: all 0.3s; }
    .vote-counter .heart.used { opacity: 1; color: var(--neon-magenta); text-shadow: 0 0 8px rgba(255,0,255,0.6); }
    .vote-counter.maxed { border-color: rgba(255,50,50,0.4); color: #ff5555; }

    /* ===== MAIN GRID ===== */
    .grid-container {
      position: relative; z-index: 10;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      grid-template-areas: "top10 songlist" "setlist setlist";
      gap: 1.5rem; padding: 1rem 2rem 2rem;
      max-width: 1700px; margin: 0 auto;
      padding-bottom: 1.5rem;
    }

    /* ===== PANEL BASE ===== */
    .panel {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      overflow: hidden; position: relative;
    }

    .panel::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
      opacity: 0.5;
    }

    .panel-header {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      padding: 1.2rem 1.5rem 0.8rem;
      display: flex; align-items: center; gap: 0.6rem;
    }

    .panel-header .icon { font-size: 1.1rem; }

    /* ===== TOP 10 PANEL ===== */
    .top10-panel { grid-area: top10; max-height: 640px; overflow-y: auto; }
    .top10-panel .panel-header {
      color: var(--neon-magenta);
      text-shadow: 0 0 20px rgba(255,0,255,0.5);
    }

    .top10-list { list-style: none; padding: 0 1rem 1rem; }

    .top10-item {
      display: flex; align-items: center; gap: 0.8rem;
      padding: 0.65rem 0.8rem; border-radius: 10px;
      transition: all 0.4s cubic-bezier(0.25,0.8,0.25,1);
      cursor: pointer; position: relative;
    }

    .top10-item:hover {
      background: rgba(255,0,255,0.08);
      transform: translateX(4px);
    }

    .top10-rank {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900; font-size: 1.4rem;
      min-width: 2.2rem; text-align: center;
      color: var(--neon-magenta);
      text-shadow: 0 0 15px rgba(255,0,255,0.6);
    }

    .top10-item:nth-child(1) .top10-rank {
      font-size: 1.8rem; color: var(--neon-cyan);
      text-shadow: 0 0 25px rgba(0,255,247,0.8), 0 0 50px rgba(0,255,247,0.3);
    }
    .top10-item:nth-child(2) .top10-rank { font-size: 1.6rem; text-shadow: 0 0 20px rgba(255,0,255,0.7); }
    .top10-item:nth-child(3) .top10-rank { font-size: 1.5rem; }

    .top10-info { flex: 1; min-width: 0; }
    .top10-title { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .top10-artist { font-size: 0.8rem; color: var(--text-secondary); }

    .top10-votes {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem; font-weight: 600;
      color: var(--neon-purple);
      text-shadow: 0 0 10px rgba(180,0,255,0.5);
      white-space: nowrap;
    }

    .top10-empty {
      text-align: center; padding: 3rem 1rem;
      color: var(--text-dim); font-size: 0.95rem;
    }
    .top10-empty .empty-icon { font-size: 2.5rem; display: block; margin-bottom: 0.8rem; opacity: 0.4; }

    /* ===== SONG LIST PANEL ===== */
    .songlist-panel { grid-area: songlist; max-height: 640px; display: flex; flex-direction: column; }
    .songlist-panel .panel-header {
      color: var(--neon-cyan);
      text-shadow: 0 0 20px rgba(0,255,247,0.5);
    }

    /* ===== GENRE FILTER CHIPS ===== */
    .filter-bar {
      display: flex; gap: 0.4rem; padding: 0 1.2rem 0.6rem;
      flex-wrap: wrap;
    }

    .filter-chip {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 0.3rem 0.7rem; border-radius: 14px;
      border: 1px solid rgba(0,255,247,0.2);
      background: transparent; color: var(--text-secondary);
      cursor: pointer; transition: all 0.25s ease;
    }

    .filter-chip:hover {
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
    }

    .filter-chip.active {
      background: rgba(0,255,247,0.12);
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
      box-shadow: 0 0 12px rgba(0,255,247,0.2);
      text-shadow: 0 0 8px rgba(0,255,247,0.4);
    }

    .search-wrapper { padding: 0 1.2rem 0.8rem; position: relative; }

    .search-input {
      width: 100%; padding: 0.7rem 1rem 0.7rem 2.6rem;
      background: rgba(0,255,247,0.04);
      border: 1px solid rgba(0,255,247,0.12);
      border-radius: 10px; color: var(--text-primary);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem; font-weight: 500;
      outline: none; transition: all 0.3s ease;
    }

    .search-input::placeholder { color: var(--text-dim); }
    .search-input:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 15px rgba(0,255,247,0.15), inset 0 0 15px rgba(0,255,247,0.03);
    }

    .search-icon {
      position: absolute; left: 2rem; top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim); font-size: 0.9rem;
      pointer-events: none; transition: color 0.3s;
    }
    .search-input:focus ~ .search-icon { color: var(--neon-cyan); }

    .song-list-container { flex: 1; overflow-y: auto; padding: 0 0.8rem 1rem; }

    .song-item {
      display: flex; align-items: center; gap: 0.8rem;
      padding: 0.6rem 0.8rem; border-radius: 10px;
      transition: all 0.25s ease; cursor: default;
    }
    .song-item:hover { background: rgba(0,255,247,0.06); }

    .song-info { flex: 1; min-width: 0; }
    .song-title { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-artist { font-size: 0.8rem; color: var(--text-secondary); }

    .song-genre {
      font-size: 0.65rem; font-weight: 600;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--neon-blue); opacity: 0.6;
    }

    .song-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }

    /* ===== BUTTONS ===== */
    .btn {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700; font-size: 0.78rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.4rem 0.9rem; border-radius: 8px;
      border: 1px solid; cursor: pointer;
      transition: all 0.3s ease;
      position: relative; overflow: hidden;
    }

    .btn-preview {
      background: rgba(0,180,255,0.08);
      border-color: rgba(0,180,255,0.3);
      color: var(--neon-blue);
    }
    .btn-preview:hover {
      background: rgba(0,180,255,0.18);
      border-color: var(--neon-blue);
      box-shadow: 0 0 18px rgba(0,180,255,0.25);
      transform: scale(1.05);
    }

    .btn-vote {
      background: rgba(255,0,255,0.08);
      border-color: rgba(255,0,255,0.3);
      color: var(--neon-magenta);
    }
    .btn-vote:hover {
      background: rgba(255,0,255,0.18);
      border-color: var(--neon-magenta);
      box-shadow: 0 0 18px rgba(255,0,255,0.3);
      transform: scale(1.05);
      animation: voteGlow 0.6s ease-in-out infinite alternate;
    }
    .btn-vote.voted {
      background: rgba(255,0,255,0.2);
      border-color: var(--neon-magenta); color: #fff;
    }
    .btn-vote:disabled {
      opacity: 0.3; cursor: not-allowed;
      transform: none !important;
      animation: none !important;
      box-shadow: none !important;
    }

    @keyframes voteGlow {
      from { box-shadow: 0 0 10px rgba(255,0,255,0.2); }
      to { box-shadow: 0 0 25px rgba(255,0,255,0.5); }
    }

    /* ===== VOTE BURST + LIVE ANIMATION ===== */
    .vote-burst {
      position: fixed; pointer-events: none; z-index: 9999;
      font-size: 1.5rem;
      animation: burstUp 0.8s ease-out forwards;
    }

    @keyframes burstUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(1.5); }
    }

    .live-vote-toast {
      position: fixed; z-index: 9998;
      pointer-events: none;
      right: 20px;
      padding: 0.6rem 1.2rem;
      background: rgba(10,10,24,0.9);
      border: 1px solid var(--neon-magenta);
      border-radius: 12px;
      font-size: 0.85rem; font-weight: 600;
      color: var(--text-primary);
      box-shadow: 0 0 20px rgba(255,0,255,0.3);
      backdrop-filter: blur(8px);
      animation: toastSlideIn 0.4s ease-out, toastFadeOut 0.4s ease-in 2.6s forwards;
    }

    .live-vote-toast .toast-heart {
      color: var(--neon-magenta); margin-right: 0.4rem;
    }

    .live-vote-toast .toast-song {
      color: var(--neon-cyan);
      text-shadow: 0 0 8px rgba(0,255,247,0.4);
    }

    @keyframes toastSlideIn {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes toastFadeOut {
      to { opacity: 0; transform: translateX(40px); }
    }

    /* ===== VOTING CLOSED OVERLAY ===== */
    .voting-closed-banner {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 99;
      background: rgba(255,30,30,0.12);
      border-top: 1px solid rgba(255,50,50,0.4);
      padding: 0.8rem;
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: #ff5555;
      text-shadow: 0 0 15px rgba(255,50,50,0.5);
      backdrop-filter: blur(10px);
    }

    .voting-closed-banner.show { display: block; }

    /* ===== CELEBRATION OVERLAY ===== */
    .celebrate-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 10000;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      flex-direction: column;
      align-items: center; justify-content: center;
      cursor: default;
    }

    .celebrate-overlay.active { display: flex; }

    .celebrate-close {
      position: absolute; top: 1.5rem; right: 1.5rem; z-index: 2;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff; font-size: 1.2rem;
      cursor: pointer; transition: all 0.3s ease;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }

    .celebrate-close:hover {
      background: rgba(255,50,50,0.3);
      border-color: rgba(255,50,50,0.6);
      box-shadow: 0 0 15px rgba(255,50,50,0.3);
      transform: scale(1.1);
    }

    .celebrate-canvas {
      position: absolute; inset: 0; z-index: 0;
      pointer-events: none;
    }

    .celebrate-content {
      position: relative; z-index: 1;
      text-align: center;
      animation: celebrateIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      max-width: 90vw;
    }

    @keyframes celebrateIn {
      0% { opacity: 0; transform: scale(0.3) rotate(-5deg); }
      50% { transform: scale(1.08) rotate(1deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .celebrate-emoji {
      font-size: clamp(4rem, 12vw, 8rem);
      animation: emojiPop 1s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 30px rgba(255,200,0,0.5));
    }

    @keyframes emojiPop {
      0% { transform: scale(1) rotate(-3deg); }
      100% { transform: scale(1.15) rotate(3deg); }
    }

    .celebrate-message {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.5rem, 5vw, 3.5rem);
      font-weight: 900;
      letter-spacing: 0.05em;
      margin: 1rem 0;
      padding: 0 1rem;
      line-height: 1.3;
      animation: textGlow 2s ease-in-out infinite alternate;
    }

    .celebrate-message.birthday {
      background: linear-gradient(135deg, #ff6a00, #ff00ff, #00fff7, #39ff14, #ff2d95);
      background-size: 300% 300%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: rainbowShift 3s ease-in-out infinite;
    }

    .celebrate-message.winner {
      background: linear-gradient(135deg, #ffd700, #ffaa00, #fff4a0, #ffd700);
      background-size: 200% 200%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: goldShift 2s ease-in-out infinite alternate;
    }

    .celebrate-message.announcement {
      color: var(--neon-cyan);
      text-shadow: 0 0 30px rgba(0,255,247,0.6), 0 0 60px rgba(0,255,247,0.3);
    }

    .celebrate-message.custom {
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 30px rgba(0,255,247,0.4));
    }

    @keyframes rainbowShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes goldShift {
      0% { background-position: 0% 50%; filter: drop-shadow(0 0 20px rgba(255,215,0,0.4)); }
      100% { background-position: 100% 50%; filter: drop-shadow(0 0 40px rgba(255,215,0,0.7)); }
    }

    @keyframes textGlow {
      0% { filter: drop-shadow(0 0 15px rgba(0,255,247,0.3)); }
      100% { filter: drop-shadow(0 0 35px rgba(255,0,255,0.5)); }
    }

    .celebrate-sub {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      color: var(--text-secondary);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 0.5rem;
      animation: fadeInUp 1s ease-out 0.5s both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .celebrate-sparkles {
      position: absolute; inset: 0; z-index: 0;
      pointer-events: none; overflow: hidden;
    }

    .sparkle {
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
      animation: sparkleFloat linear infinite;
      pointer-events: none;
    }

    @keyframes sparkleFloat {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-20vh) rotate(720deg); opacity: 0; }
    }

    /* ===== SETLIST PANEL ===== */
    .setlist-panel {
      grid-area: setlist;
      border: 1px solid rgba(255, 210, 74, 0.25);
      box-shadow: 0 0 30px rgba(255, 122, 26, 0.08), inset 0 0 30px rgba(255, 210, 74, 0.02);
    }
    .setlist-panel::before {
      background: linear-gradient(90deg, transparent, var(--party-gold), var(--party-orange), var(--party-gold), transparent);
      opacity: 0.7;
      height: 2px;
    }
    .setlist-panel .panel-header {
      color: var(--party-gold);
      text-shadow: 0 0 24px rgba(255,210,74,0.6);
      padding: 1.5rem 2rem 0.8rem;
      font-size: 1.15rem;
      letter-spacing: 0.18em;
      justify-content: space-between;
      align-items: baseline;
    }
    .setlist-panel .panel-header .icon { font-size: 1.5rem; }

    .setlist-meta {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem; font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
      text-transform: none;
    }
    .setlist-meta strong {
      color: var(--party-gold);
      font-weight: 800;
      text-shadow: 0 0 10px rgba(255,210,74,0.4);
    }

    .setlist-container { padding: 0.4rem 1.5rem 1.8rem; }

    .setlist-empty {
      text-align: center; padding: 3.5rem 1rem;
      color: var(--text-dim); font-size: 1.05rem;
    }
    .setlist-empty .empty-icon { font-size: 3rem; display: block; margin-bottom: 1rem; opacity: 0.4; }

    .setlist-list {
      list-style: none; display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 0.8rem;
    }

    .setlist-item {
      display: flex; align-items: center; gap: 1rem;
      padding: 1rem 1.2rem; border-radius: 14px;
      background: rgba(255,122,26,0.05);
      border: 1px solid rgba(255,122,26,0.15);
      transition: all 0.3s ease;
      position: relative; overflow: hidden;
      min-height: 72px;
    }
    .setlist-item:hover {
      background: rgba(255,122,26,0.1);
      border-color: rgba(255,122,26,0.35);
      transform: translateY(-2px);
    }

    .setlist-item.played {
      opacity: 0.4;
      background: rgba(255,255,255,0.02);
    }
    .setlist-item.played .setlist-title { text-decoration: line-through; }

    .setlist-item.now-playing {
      background: linear-gradient(90deg, rgba(255,210,74,0.20), rgba(255,122,26,0.12));
      border-color: var(--party-gold);
      box-shadow: 0 0 30px rgba(255,210,74,0.3), inset 0 0 25px rgba(255,210,74,0.06);
      animation: nowPlayingPulse 2s ease-in-out infinite alternate;
    }

    @keyframes nowPlayingPulse {
      from { box-shadow: 0 0 22px rgba(255,210,74,0.22), inset 0 0 18px rgba(255,210,74,0.05); }
      to { box-shadow: 0 0 42px rgba(255,210,74,0.5), inset 0 0 28px rgba(255,210,74,0.1); }
    }

    .setlist-pos {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900; font-size: 1.7rem;
      min-width: 2.6rem; text-align: center;
      color: var(--party-orange);
      text-shadow: 0 0 14px rgba(255,122,26,0.5);
    }
    .setlist-item.now-playing .setlist-pos {
      color: var(--party-gold);
      text-shadow: 0 0 18px rgba(255,210,74,0.8);
    }

    .setlist-info { flex: 1; min-width: 0; }
    .setlist-title { font-weight: 700; font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.25; }
    .setlist-artist { font-size: 0.92rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 0.15rem; }

    .setlist-votes {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem; font-weight: 700;
      color: var(--neon-magenta);
      text-shadow: 0 0 12px rgba(255,0,255,0.6);
      white-space: nowrap;
      padding: 0.4rem 0.75rem;
      border-radius: 14px;
      background: rgba(255,0,255,0.1);
      border: 1px solid rgba(255,0,255,0.25);
    }

    .now-playing-badge {
      position: absolute; top: 0.5rem; right: 0.8rem;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.62rem; font-weight: 800;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--party-gold);
      text-shadow: 0 0 10px rgba(255,210,74,0.8);
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.2rem 0.5rem;
      background: rgba(0,0,0,0.4);
      border-radius: 10px;
      backdrop-filter: blur(4px);
    }

    .live-equalizer { display: inline-flex; align-items: flex-end; gap: 2px; height: 12px; }
    .live-equalizer .eq-bar {
      width: 2.5px; background: var(--party-gold); border-radius: 2px;
      animation: eqBounce 0.7s ease-in-out infinite alternate;
      box-shadow: 0 0 5px rgba(255,210,74,0.8);
    }
    .live-equalizer .eq-bar:nth-child(1) { height: 5px; animation-delay: 0s; }
    .live-equalizer .eq-bar:nth-child(2) { height: 11px; animation-delay: 0.15s; }
    .live-equalizer .eq-bar:nth-child(3) { height: 6px; animation-delay: 0.3s; }
    .live-equalizer .eq-bar:nth-child(4) { height: 9px; animation-delay: 0.1s; }

    @keyframes eqBounce { 0% { transform: scaleY(0.4); } 100% { transform: scaleY(1); } }

    /* ===== QR CODE OVERLAY ===== */
    .qr-overlay {
      position: fixed;
      bottom: 1.2rem; right: 1.2rem;
      z-index: 90;
      background: rgba(10, 6, 18, 0.92);
      border: 1px solid rgba(255, 210, 74, 0.35);
      border-radius: 14px;
      padding: 0.8rem 0.8rem 0.6rem;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 25px rgba(255, 122, 26, 0.15), 0 8px 24px rgba(0,0,0,0.4);
      text-align: center;
      transition: all 0.3s ease;
    }
    .qr-overlay:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 35px rgba(255, 210, 74, 0.3), 0 10px 30px rgba(0,0,0,0.5);
      border-color: var(--party-gold);
    }
    .qr-overlay .qr-code {
      width: 120px; height: 120px;
      background: #fff;
      padding: 6px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .qr-overlay .qr-code img,
    .qr-overlay .qr-code canvas {
      display: block; width: 100%; height: 100%;
    }
    .qr-overlay .qr-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--party-gold);
      text-shadow: 0 0 8px rgba(255,210,74,0.5);
      margin-top: 0.55rem;
    }
    .qr-toggle {
      position: absolute;
      top: -10px; right: -10px;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: rgba(10, 6, 18, 0.95);
      border: 1px solid rgba(255, 210, 74, 0.4);
      color: var(--party-gold);
      font-size: 0.75rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .qr-toggle:hover { background: rgba(255, 210, 74, 0.2); }
    .qr-overlay.collapsed .qr-code,
    .qr-overlay.collapsed .qr-label { display: none; }
    .qr-overlay.collapsed {
      padding: 0.5rem 0.8rem;
    }
    .qr-overlay.collapsed::before {
      content: '\1F4F1  Scan';
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--party-gold);
    }

    .song-count {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.75rem; font-weight: 600;
      color: var(--text-dim); margin-left: auto;
      letter-spacing: 0.05em;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      header { padding: 1.2rem 0.8rem 0.3rem; }
      .timer-bar.active ~ header { padding-top: 3.2rem; }
      .logo { font-size: 1.6rem; letter-spacing: 0.1em; }
      .subtitle { font-size: 0.8rem; letter-spacing: 0.25em; }
      .vote-counter { font-size: 0.65rem; padding: 0.3rem 0.8rem; margin-top: 0.4rem; }
      .vote-counter .hearts { font-size: 0.75rem; }

      .grid-container {
        grid-template-columns: 1fr;
        grid-template-areas: "top10" "songlist" "setlist";
        padding: 0.6rem;
        gap: 0.8rem;
      }

      .top10-panel { max-height: 280px; }
      .songlist-panel { max-height: 350px; }

      .panel-header { padding: 0.8rem 1rem 0.5rem; font-size: 0.72rem; }
      .filter-bar { padding: 0 0.8rem 0.5rem; gap: 0.3rem; }
      .filter-chip { font-size: 0.65rem; padding: 0.25rem 0.55rem; }
      .search-wrapper { padding: 0 0.8rem 0.6rem; }
      .search-input { padding: 0.55rem 0.8rem 0.55rem 2.2rem; font-size: 0.85rem; }
      .search-icon { left: 1.5rem; }

      .song-item { padding: 0.5rem 0.6rem; gap: 0.5rem; }
      .song-title { font-size: 0.85rem; }
      .song-artist { font-size: 0.72rem; }
      .song-genre { font-size: 0.6rem; }
      .btn { font-size: 0.68rem; padding: 0.35rem 0.65rem; }

      .top10-item { padding: 0.5rem 0.6rem; gap: 0.5rem; }
      .top10-rank { font-size: 1.1rem; min-width: 1.8rem; }
      .top10-item:nth-child(1) .top10-rank { font-size: 1.4rem; }
      .top10-item:nth-child(2) .top10-rank { font-size: 1.2rem; }
      .top10-title { font-size: 0.85rem; }
      .top10-artist { font-size: 0.72rem; }
      .top10-votes { font-size: 0.65rem; }

      .setlist-panel .panel-header { padding: 0.9rem 1rem 0.5rem; font-size: 0.85rem; }
      .setlist-panel .panel-header .icon { font-size: 1.1rem; }
      .setlist-meta { font-size: 0.75rem; }
      .setlist-container { padding: 0.2rem 0.6rem 1rem; }
      .setlist-list { grid-template-columns: 1fr; gap: 0.5rem; }
      .setlist-item { padding: 0.65rem 0.8rem; gap: 0.7rem; min-height: 60px; }
      .setlist-pos { font-size: 1.2rem; min-width: 1.8rem; }
      .setlist-title { font-size: 0.92rem; }
      .setlist-artist { font-size: 0.78rem; }
      .setlist-votes { font-size: 0.72rem; padding: 0.25rem 0.55rem; }
      .now-playing-badge { font-size: 0.55rem; top: 0.3rem; right: 0.4rem; padding: 0.15rem 0.4rem; }

      .grid-container { padding: 0.6rem; }

      /* QR overlay: collapse on mobile to a small badge */
      .qr-overlay {
        bottom: 0.6rem; right: 0.6rem;
        padding: 0.5rem 0.7rem;
      }
      .qr-overlay .qr-code { width: 70px; height: 70px; padding: 4px; }
      .qr-overlay .qr-label { font-size: 0.5rem; margin-top: 0.35rem; }

      .timer-bar { padding: 0.4rem 1rem; }
      .timer-bar .timer-label { font-size: 0.6rem; }
      .timer-bar .timer-clock { font-size: 1.1rem; }

      .voting-closed-banner { font-size: 0.72rem; padding: 0.6rem; }

      .celebrate-message { font-size: clamp(1.2rem, 4vw, 2rem); }
      .celebrate-emoji { font-size: clamp(3rem, 10vw, 5rem); }
      .celebrate-close { top: 0.8rem; right: 0.8rem; width: 36px; height: 36px; font-size: 1rem; }
    }

    @media (max-width: 400px) {
      .song-actions { flex-direction: column; gap: 0.3rem; }
      .btn { font-size: 0.62rem; padding: 0.3rem 0.5rem; }
      .top10-panel { max-height: 240px; }
      .songlist-panel { max-height: 300px; }
    }

    /* ===== ENTRANCE ANIMATIONS ===== */
    .panel { opacity: 0; transform: translateY(20px); animation: panelIn 0.6s ease-out forwards; }
    .top10-panel { animation-delay: 0.1s; }
    .songlist-panel { animation-delay: 0.2s; }
    .setlist-panel { animation-delay: 0.3s; }

    @keyframes panelIn { to { opacity: 1; transform: translateY(0); } }

    .song-item { opacity: 0; animation: fadeSlideIn 0.3s ease-out forwards; }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateX(10px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div class="bg-image" aria-hidden="true"></div>
  <canvas id="particles"></canvas>
  <div class="stage-lights" aria-hidden="true">
    <div class="beam b1"></div>
    <div class="beam b2"></div>
    <div class="beam b3"></div>
    <div class="beam b4"></div>
  </div>

  <!-- COUNTDOWN TIMER BAR -->
  <div class="timer-bar" id="timerBar">
    <span class="timer-label">Stemmen sluiten over</span>
    <span class="timer-clock" id="timerClock">--:--</span>
    <div class="timer-progress" id="timerProgress"></div>
  </div>

  <header>
    <h1 class="logo">Music Request</h1>
    <p class="subtitle">Kies jouw nummer</p>
    <div class="vote-counter" id="voteCounter">
      <div class="hearts" id="voteHearts"></div>
      <span id="voteCountText">0/5 stemmen</span>
    </div>
  </header>

  <main class="grid-container">
    <!-- TOP 10 PANEL -->
    <section class="panel top10-panel">
      <div class="panel-header">
        <span class="icon">&#9829;</span>
        Top 10 Verzoeken
      </div>
      <ul class="top10-list" id="top10List">
        <li class="top10-empty">
          <span class="empty-icon">&#9835;</span>
          Nog geen stemmen — wees de eerste!
        </li>
      </ul>
    </section>

    <!-- SONG LIST PANEL -->
    <section class="panel songlist-panel">
      <div class="panel-header">
        <span class="icon">&#9835;</span>
        Alle Nummers
        <span class="song-count" id="songCount"></span>
      </div>
      <div class="filter-bar" id="filterBar">
        <button class="filter-chip active" data-genre="all">Alle</button>
        <button class="filter-chip" data-genre="Rock">Rock</button>
        <button class="filter-chip" data-genre="Pop">Pop</button>
        <button class="filter-chip" data-genre="Dance">Dance</button>
        <button class="filter-chip" data-genre="Classic">Classic</button>
        <button class="filter-chip" data-genre="Alternative">Alternative</button>
      </div>
      <div class="search-wrapper">
        <input type="text" class="search-input" id="searchInput" placeholder="Zoek op titel of artiest...">
        <span class="search-icon">&#128269;</span>
      </div>
      <div class="song-list-container" id="songListContainer"></div>
    </section>

    <!-- SETLIST PANEL -->
    <section class="panel setlist-panel">
      <div class="panel-header">
        <span><span class="icon">&#127908;</span> Setlist Vanavond</span>
        <span class="setlist-meta" id="setlistMeta"></span>
      </div>
      <div class="setlist-container">
        <ul class="setlist-list" id="setlistList">
          <li class="setlist-empty" style="grid-column: 1 / -1;">
            <span class="empty-icon">&#127925;</span>
            De setlist wordt nog samengesteld...
          </li>
        </ul>
      </div>
    </section>
  </main>

  <!-- QR CODE OVERLAY -->
  <div class="qr-overlay" id="qrOverlay" title="Scan om mee te stemmen">
    <button class="qr-toggle" id="qrToggle" title="Verberg/toon">&minus;</button>
    <div class="qr-code" id="qrCode"></div>
    <div class="qr-label">Scan om te stemmen</div>
  </div>

  <!-- VOTING CLOSED BANNER -->
  <div class="voting-closed-banner" id="votingClosedBanner">
    &#9888; Stemmen is gesloten!
  </div>

  <!-- CELEBRATION OVERLAY -->
  <div class="celebrate-overlay" id="celebrateOverlay">
    <canvas class="celebrate-canvas" id="celebrateCanvas"></canvas>
    <div class="celebrate-sparkles" id="celebrateSparkles"></div>
    <button class="celebrate-close" onclick="hideCelebration(true)" title="Sluiten">&#10005;</button>
    <div class="celebrate-content">
      <div class="celebrate-emoji" id="celebrateEmoji"></div>
      <div class="celebrate-message" id="celebrateMessage"></div>
      <div class="celebrate-sub" id="celebrateSub"></div>
    </div>
  </div>

  <script>
    // ===== USER ID =====
    let userId = localStorage.getItem('userId');
    if (!userId) {
      userId = crypto.randomUUID();
      localStorage.setItem('userId', userId);
    }

    // ===== STATE =====
    let allSongs = [];
    let top10 = [];
    let setlistData = { songs: [], nowPlayingId: null };
    let votesUsed = 0;
    const MAX_VOTES = 5;
    let activeGenre = 'all';
    let votingClosed = false;
    let timerData = null;
    let timerInterval = null;
    let toastCounter = 0;

    // ===== DOM REFS =====
    const top10List = document.getElementById('top10List');
    const songListContainer = document.getElementById('songListContainer');
    const songCount = document.getElementById('songCount');
    const searchInput = document.getElementById('searchInput');
    const setlistList = document.getElementById('setlistList');
    const setlistMeta = document.getElementById('setlistMeta');
    const voteCounter = document.getElementById('voteCounter');
    const voteHearts = document.getElementById('voteHearts');
    const voteCountText = document.getElementById('voteCountText');
    const timerBar = document.getElementById('timerBar');
    const timerClock = document.getElementById('timerClock');
    const timerProgress = document.getElementById('timerProgress');
    const votingClosedBanner = document.getElementById('votingClosedBanner');
    const filterBar = document.getElementById('filterBar');

    // ===== API HELPERS =====
    function apiHeaders() {
      return { 'Content-Type': 'application/json', 'X-User-Id': userId };
    }

    // ===== API =====
    async function fetchAllSongs() {
      try {
        const res = await fetch('/api/songs', { headers: apiHeaders() });
        allSongs = await res.json();
        applyFilters();
      } catch (e) { console.error('Failed to fetch songs:', e); }
    }

    async function fetchTop10() {
      try {
        const res = await fetch('/api/top10');
        top10 = await res.json();
        renderTop10(top10);
      } catch (e) { console.error('Failed to fetch top 10:', e); }
    }

    async function fetchSetlist() {
      try {
        const res = await fetch('/api/setlist');
        setlistData = await res.json();
        renderSetlist();
      } catch (e) { console.error('Failed to fetch setlist:', e); }
    }

    async function fetchVotesUsed() {
      try {
        const res = await fetch('/api/votes-used', { headers: apiHeaders() });
        const data = await res.json();
        votesUsed = data.votesUsed;
        renderVoteCounter();
      } catch (e) { console.error('Failed to fetch votes:', e); }
    }

    async function fetchTimer() {
      try {
        const res = await fetch('/api/timer');
        timerData = await res.json();
        updateTimerDisplay();
      } catch (e) { console.error('Failed to fetch timer:', e); }
    }

    async function voteSong(id, btn) {
      if (votingClosed || votesUsed >= MAX_VOTES) return;

      try {
        const res = await fetch(`/api/songs/${id}/vote`, {
          method: 'POST',
          headers: apiHeaders()
        });

        if (!res.ok) {
          const err = await res.json();
          showToast(err.error, true);
          return;
        }

        const data = await res.json();
        votesUsed = data.votesUsed;
        renderVoteCounter();

        btn.classList.add('voted');
        showVoteBurst(btn);

        fetchTop10();
        fetchSetlist();
        if (votesUsed >= MAX_VOTES) applyFilters();
      } catch (e) { console.error('Vote failed:', e); }
    }

    // ===== RENDER: VOTE COUNTER =====
    function renderVoteCounter() {
      let hearts = '';
      for (let i = 0; i < MAX_VOTES; i++) {
        hearts += `<span class="heart ${i < votesUsed ? 'used' : ''}">&#9829;</span>`;
      }
      voteHearts.innerHTML = hearts;
      voteCountText.textContent = `${votesUsed}/${MAX_VOTES} stemmen`;
      voteCounter.classList.toggle('maxed', votesUsed >= MAX_VOTES);
    }

    // ===== RENDER: TOP 10 =====
    function renderTop10(songs) {
      if (songs.length === 0) {
        top10List.innerHTML = `
          <li class="top10-empty">
            <span class="empty-icon">&#9835;</span>
            Nog geen stemmen — wees de eerste!
          </li>`;
        return;
      }

      top10List.innerHTML = songs.map((song, i) => `
        <li class="top10-item">
          <span class="top10-rank">${i + 1}</span>
          <div class="top10-info">
            <div class="top10-title">${esc(song.title)}</div>
            <div class="top10-artist">${esc(song.artist)}</div>
          </div>
          <span class="top10-votes">${song.votes} &#9829;</span>
        </li>
      `).join('');
    }

    // ===== RENDER: SETLIST =====
    function renderSetlist() {
      const songs = setlistData.songs || [];
      const nowPlayingId = setlistData.nowPlayingId;

      if (songs.length === 0) {
        setlistList.innerHTML = `
          <li class="setlist-empty" style="grid-column: 1 / -1;">
            <span class="empty-icon">&#127925;</span>
            De setlist wordt nog samengesteld...
          </li>`;
        setlistMeta.textContent = '';
        return;
      }

      const remaining = songs.filter(s => !s.played).length;
      setlistMeta.innerHTML = `<strong>${remaining}</strong> van <strong>${songs.length}</strong> nog te spelen`;

      setlistList.innerHTML = songs.map((song, i) => {
        const isNow = song.id === nowPlayingId;
        const cls = ['setlist-item'];
        if (song.played) cls.push('played');
        if (isNow) cls.push('now-playing');
        return `
          <li class="${cls.join(' ')}">
            ${isNow ? `
              <span class="now-playing-badge">
                <span class="live-equalizer">
                  <span class="eq-bar"></span><span class="eq-bar"></span>
                  <span class="eq-bar"></span><span class="eq-bar"></span>
                </span>
                Live
              </span>` : ''}
            <span class="setlist-pos">${String(i + 1).padStart(2, '0')}</span>
            <div class="setlist-info">
              <div class="setlist-title">${esc(song.title)}</div>
              <div class="setlist-artist">${esc(song.artist)}</div>
            </div>
            <span class="setlist-votes">${song.votes} &#9829;</span>
          </li>
        `;
      }).join('');
    }

    // ===== GENRE FILTER =====
    filterBar.addEventListener('click', e => {
      const chip = e.target.closest('.filter-chip');
      if (!chip) return;
      filterBar.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeGenre = chip.dataset.genre;
      applyFilters();
    });

    function applyFilters() {
      const q = searchInput.value.toLowerCase().trim();
      let filtered = allSongs;

      if (activeGenre !== 'all') {
        filtered = filtered.filter(s => s.genre === activeGenre);
      }
      if (q) {
        filtered = filtered.filter(s =>
          s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q)
        );
      }
      renderSongList(filtered);
    }

    // ===== RENDER: SONG LIST =====
    function renderSongList(songs) {
      songCount.textContent = `${songs.length} nummers`;
      const disableVotes = votingClosed || votesUsed >= MAX_VOTES;

      songListContainer.innerHTML = songs.map((song, i) => `
        <div class="song-item" style="animation-delay: ${Math.min(i * 0.03, 0.5)}s">
          <div class="song-info">
            <div class="song-title">${esc(song.title)}</div>
            <div class="song-artist">${esc(song.artist)}</div>
            <div class="song-genre">${esc(song.genre)}</div>
          </div>
          <div class="song-actions">
            <button class="btn btn-vote"
                    onclick="voteSong(${song.id}, this)"
                    ${disableVotes ? 'disabled' : ''}
                    title="${disableVotes ? (votingClosed ? 'Stemmen gesloten' : 'Maximum bereikt') : 'Stem op dit nummer'}">
              &#9829; Vote
            </button>
          </div>
        </div>
      `).join('');
    }

    // ===== VOTE BURST =====
    function showVoteBurst(btn) {
      const rect = btn.getBoundingClientRect();
      const burst = document.createElement('span');
      burst.className = 'vote-burst';
      burst.textContent = '\u2764';
      burst.style.left = rect.left + rect.width / 2 - 12 + 'px';
      burst.style.top = rect.top - 10 + 'px';
      document.body.appendChild(burst);
      setTimeout(() => burst.remove(), 800);
    }

    // ===== LIVE VOTE TOAST =====
    function showLiveVoteToast(title, artist) {
      toastCounter++;
      const toast = document.createElement('div');
      toast.className = 'live-vote-toast';
      toast.style.top = (60 + ((toastCounter % 4) * 55)) + 'px';
      toast.innerHTML = `<span class="toast-heart">&#9829;</span> Iemand stemde op <span class="toast-song">${esc(title)}</span>`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // ===== ERROR TOAST =====
    function showToast(msg, isError) {
      const toast = document.createElement('div');
      toast.className = 'live-vote-toast';
      toast.style.top = '70px';
      if (isError) {
        toast.style.borderColor = '#ff3333';
        toast.style.boxShadow = '0 0 20px rgba(255,50,50,0.3)';
      }
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // ===== SEARCH =====
    let searchTimeout;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(applyFilters, 200);
    });

    // ===== TIMER =====
    function updateTimerDisplay() {
      if (!timerData || !timerData.active || !timerData.endsAt) {
        timerBar.classList.remove('active', 'urgent', 'expired');
        votingClosed = false;
        votingClosedBanner.classList.remove('show');
        clearInterval(timerInterval);
        return;
      }

      timerBar.classList.add('active');
      clearInterval(timerInterval);

      function tick() {
        const now = Date.now();
        const end = new Date(timerData.endsAt).getTime();
        const diff = end - now;

        if (diff <= 0) {
          timerClock.textContent = '00:00';
          timerBar.classList.add('expired');
          timerBar.classList.remove('urgent');
          timerBar.querySelector('.timer-label').textContent = 'Stemmen gesloten!';
          votingClosed = true;
          votingClosedBanner.classList.add('show');
          applyFilters();
          clearInterval(timerInterval);
          return;
        }

        const mins = Math.floor(diff / 60000);
        const secs = Math.floor((diff % 60000) / 1000);
        timerClock.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

        timerBar.classList.toggle('urgent', diff < 60000);
        timerBar.classList.remove('expired');
        timerBar.querySelector('.timer-label').textContent = 'Stemmen sluiten over';
        votingClosed = false;
        votingClosedBanner.classList.remove('show');
      }

      tick();
      timerInterval = setInterval(tick, 1000);
    }

    // ===== SSE: REAL-TIME EVENTS =====
    function connectSSE() {
      const source = new EventSource('/api/events');

      source.addEventListener('vote', e => {
        const data = JSON.parse(e.data);
        if (data.userId !== userId.slice(0, 8)) {
          showLiveVoteToast(data.title, data.artist);
        }
        fetchTop10();
        fetchSetlist();
      });

      source.addEventListener('setlistUpdated', () => fetchSetlist());
      source.addEventListener('nowPlayingUpdated', () => fetchSetlist());

      source.addEventListener('timer', e => {
        timerData = JSON.parse(e.data);
        updateTimerDisplay();
      });

      source.addEventListener('votesReset', () => {
        votesUsed = 0;
        renderVoteCounter();
        fetchAllSongs();
        fetchTop10();
        fetchSetlist();
        showToast('Alle stemmen zijn gereset!', false);
      });

      source.addEventListener('songAdded', () => fetchAllSongs());
      source.addEventListener('songRemoved', () => { fetchAllSongs(); fetchTop10(); fetchSetlist(); });
      source.addEventListener('songPlayed', e => {
        const data = JSON.parse(e.data);
        showToast(`"${data.title}" is gespeeld!`, false);
        fetchAllSongs();
        fetchTop10();
        fetchSetlist();
      });

      source.addEventListener('celebrate', e => {
        const data = JSON.parse(e.data);
        if (!celebrationDismissed) showCelebration(data.message, data.type);
      });

      source.addEventListener('celebrateStop', () => {
        celebrationDismissed = false;
        hideCelebration();
      });

      source.onerror = () => {
        source.close();
        setTimeout(connectSSE, 3000);
      };
    }

    // ===== HTML ESCAPE =====
    function esc(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // ===== PARTICLES =====
    (function initParticles() {
      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      let w, h;

      function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
      resize();
      window.addEventListener('resize', resize);

      const COLORS = ['#00fff7', '#ff00ff', '#b400ff', '#00b4ff', '#ff2d95'];
      const particles = [];
      for (let i = 0; i < 60; i++) {
        particles.push({
          x: Math.random() * w, y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4,
          size: Math.random() * 2.5 + 0.5,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          alpha: Math.random() * 0.5 + 0.1,
        });
      }

      function draw() {
        ctx.clearRect(0, 0, w, h);
        for (const p of particles) {
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
          if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.alpha;
          ctx.shadowBlur = 15;
          ctx.shadowColor = p.color;
          ctx.fill();
        }
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
        requestAnimationFrame(draw);
      }
      draw();
    })();

    // ===== CELEBRATION =====
    let confettiAnimId = null;
    let celebrationActive = false;
    let celebrationDismissed = false; // user closed it locally
    const celebrateOverlay = document.getElementById('celebrateOverlay');
    const celebrateCanvas = document.getElementById('celebrateCanvas');
    const celebrateCtx = celebrateCanvas.getContext('2d');
    const celebrateEmoji = document.getElementById('celebrateEmoji');
    const celebrateMessage = document.getElementById('celebrateMessage');
    const celebrateSub = document.getElementById('celebrateSub');
    const celebrateSparkles = document.getElementById('celebrateSparkles');

    // Poll for celebration state (fallback for SSE)
    async function pollCelebration() {
      try {
        const res = await fetch('/api/celebration');
        const data = await res.json();
        if (data.active && !celebrationActive && !celebrationDismissed) {
          showCelebration(data.message, data.type);
        } else if (!data.active) {
          // Server stopped celebration — reset dismissed flag for next one
          celebrationDismissed = false;
          if (celebrationActive) hideCelebration();
        }
      } catch (e) { /* ignore */ }
    }

    const CELEBRATE_CONFIG = {
      birthday: { emoji: '\uD83C\uDF82\uD83C\uDF89\uD83C\uDF88', sub: 'Gefeliciteerd!', colors: ['#ff6a00','#ff00ff','#00fff7','#39ff14','#ff2d95','#ffd700','#00b4ff'] },
      winner:   { emoji: '\uD83C\uDFC6\u2B50\uD83C\uDF1F', sub: 'We hebben een winnaar!', colors: ['#ffd700','#ffaa00','#fff4a0','#ff6a00','#ffe066'] },
      announcement: { emoji: '\uD83D\uDCE2\u2728', sub: 'Aankondiging', colors: ['#00fff7','#00b4ff','#b400ff','#ff00ff'] },
      custom:   { emoji: '\u2728\uD83C\uDF89\u2728', sub: '', colors: ['#00fff7','#ff00ff','#b400ff','#39ff14','#ff2d95','#ffd700'] },
    };

    function showCelebration(message, type) {
      const cfg = CELEBRATE_CONFIG[type] || CELEBRATE_CONFIG.custom;

      celebrateEmoji.textContent = cfg.emoji;
      celebrateMessage.textContent = message;
      celebrateMessage.className = 'celebrate-message ' + type;
      celebrateSub.textContent = cfg.sub;

      celebrateOverlay.classList.add('active');
      celebrationActive = true;

      // Start confetti
      startConfetti(cfg.colors);
      // Sparkles
      startSparkles(cfg.colors);
    }

    function hideCelebration(userDismissed) {
      celebrateOverlay.classList.remove('active');
      celebrationActive = false;
      if (userDismissed) celebrationDismissed = true;
      cancelAnimationFrame(confettiAnimId);
      celebrateSparkles.innerHTML = '';
    }

    // ===== CONFETTI ENGINE =====
    function startConfetti(colors) {
      celebrateCanvas.width = window.innerWidth;
      celebrateCanvas.height = window.innerHeight;

      const pieces = [];
      for (let i = 0; i < 250; i++) {
        pieces.push({
          x: Math.random() * celebrateCanvas.width,
          y: Math.random() * -celebrateCanvas.height,
          w: Math.random() * 10 + 5,
          h: Math.random() * 6 + 3,
          color: colors[Math.floor(Math.random() * colors.length)],
          vx: (Math.random() - 0.5) * 4,
          vy: Math.random() * 4 + 2,
          rot: Math.random() * 360,
          rotSpeed: (Math.random() - 0.5) * 12,
          wobble: Math.random() * Math.PI * 2,
          wobbleSpeed: Math.random() * 0.08 + 0.02,
        });
      }

      function drawConfetti() {
        celebrateCtx.clearRect(0, 0, celebrateCanvas.width, celebrateCanvas.height);

        for (const p of pieces) {
          p.wobble += p.wobbleSpeed;
          p.x += p.vx + Math.sin(p.wobble) * 1.5;
          p.y += p.vy;
          p.rot += p.rotSpeed;

          // Reset pieces that fall off
          if (p.y > celebrateCanvas.height + 20) {
            p.y = -20;
            p.x = Math.random() * celebrateCanvas.width;
          }

          celebrateCtx.save();
          celebrateCtx.translate(p.x, p.y);
          celebrateCtx.rotate((p.rot * Math.PI) / 180);
          celebrateCtx.fillStyle = p.color;
          celebrateCtx.shadowBlur = 6;
          celebrateCtx.shadowColor = p.color;
          // Mix shapes: rectangles and circles
          if (p.w > 10) {
            celebrateCtx.beginPath();
            celebrateCtx.arc(0, 0, p.h, 0, Math.PI * 2);
            celebrateCtx.fill();
          } else {
            celebrateCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          }
          celebrateCtx.restore();
        }

        confettiAnimId = requestAnimationFrame(drawConfetti);
      }

      cancelAnimationFrame(confettiAnimId);
      drawConfetti();
    }

    // ===== SPARKLE PARTICLES =====
    function startSparkles(colors) {
      celebrateSparkles.innerHTML = '';
      for (let i = 0; i < 40; i++) {
        const spark = document.createElement('div');
        spark.className = 'sparkle';
        spark.style.left = Math.random() * 100 + '%';
        spark.style.background = colors[Math.floor(Math.random() * colors.length)];
        spark.style.boxShadow = `0 0 8px ${spark.style.background}`;
        spark.style.animationDuration = (Math.random() * 3 + 2) + 's';
        spark.style.animationDelay = (Math.random() * 3) + 's';
        spark.style.width = (Math.random() * 6 + 3) + 'px';
        spark.style.height = spark.style.width;
        celebrateSparkles.appendChild(spark);
      }
    }

    // Resize handler for confetti canvas
    window.addEventListener('resize', () => {
      if (celebrateOverlay.classList.contains('active')) {
        celebrateCanvas.width = window.innerWidth;
        celebrateCanvas.height = window.innerHeight;
      }
    });

    // ===== QR CODE =====
    (function initQR() {
      const el = document.getElementById('qrCode');
      const overlay = document.getElementById('qrOverlay');
      const toggle = document.getElementById('qrToggle');
      if (!el || typeof QRCode === 'undefined') return;

      // Use the public origin so audience phones can reach it
      const url = window.location.origin + window.location.pathname;
      try {
        new QRCode(el, {
          text: url,
          width: 240,
          height: 240,
          colorDark: '#0a0612',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.M,
        });
      } catch (e) { console.error('QR error:', e); }

      // Toggle collapse — remembered in localStorage
      if (localStorage.getItem('qrCollapsed') === '1') {
        overlay.classList.add('collapsed');
        toggle.textContent = '+';
      }
      toggle.addEventListener('click', e => {
        e.stopPropagation();
        const collapsed = overlay.classList.toggle('collapsed');
        toggle.textContent = collapsed ? '+' : '\u2212';
        localStorage.setItem('qrCollapsed', collapsed ? '1' : '0');
      });
      overlay.addEventListener('click', () => {
        if (overlay.classList.contains('collapsed')) {
          overlay.classList.remove('collapsed');
          toggle.textContent = '\u2212';
          localStorage.setItem('qrCollapsed', '0');
        }
      });
    })();

    // ===== INIT =====
    fetchAllSongs();
    fetchTop10();
    fetchSetlist();
    fetchVotesUsed();
    fetchTimer();
    pollCelebration();
    connectSSE();
    setInterval(fetchTop10, 4000);
    setInterval(fetchSetlist, 5000);
    setInterval(fetchTimer, 10000);
    setInterval(pollCelebration, 3000);
  </script>
</body>
</html>
