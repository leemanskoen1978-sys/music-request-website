<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setlist | Live</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #c9a84c;
      --rose: #d4a0a0;
      --champagne: #e8d5a3;
      --bg-dark: #0a0a0a;
      --bg-panel: #111111;
      --bg-hover: #1a1a1a;
      --text-primary: #f5f0e8;
      --text-secondary: #8a8070;
      --border-gold: rgba(201,168,76,0.15);
    }

    html { scrollbar-width: thin; scrollbar-color: var(--gold) var(--bg-dark); }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Blurred band photo as fixed background — darker/warmer */
    .bg-image {
      position: fixed; inset: 0;
      background-image: url('/images/band-bg.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(18px) saturate(0.9) brightness(0.35);
      transform: scale(1.08);
      z-index: -2;
      pointer-events: none;
    }
    .bg-image::after {
      content: '';
      position: absolute; inset: 0;
      background:
        linear-gradient(180deg, rgba(40,30,15,0.9) 0%, rgba(10,10,10,0.97) 60%);
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; }

    /* Subtle warm ambient glow from above */
    body::before {
      content: '';
      position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.07) 0%, transparent 70%);
      z-index: 0; pointer-events: none;
    }

    /* ===== HEADER ===== */
    header {
      position: relative; z-index: 10;
      text-align: center;
      padding: 2.5rem 2rem 1rem;
    }

    .logo {
      font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
      font-size: clamp(2rem, 5.5vw, 4.2rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .subtitle {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: clamp(0.7rem, 1vw, 0.85rem);
      color: var(--text-secondary);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 0.6rem;
    }

    .meta-row {
      display: flex; justify-content: center; align-items: center;
      gap: 1.5rem; flex-wrap: wrap;
      margin-top: 1rem;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.85rem;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
    }
    .meta-row strong {
      font-family: 'Playfair Display', Georgia, serif;
      color: var(--gold);
      font-size: 1.15rem;
      margin-right: 0.3rem;
    }
    .meta-divider {
      width: 1px; height: 18px;
      background: rgba(255,255,255,0.08);
    }

    /* ===== MAIN ===== */
    main {
      position: relative; z-index: 10;
      max-width: 1700px; margin: 0 auto;
      padding: 1.5rem 2rem 4rem;
    }

    .setlist-empty {
      text-align: center;
      padding: 6rem 1rem;
      color: var(--text-secondary);
      font-size: 1.4rem;
    }
    .setlist-empty .empty-icon {
      font-size: 5rem;
      display: block;
      margin-bottom: 1.5rem;
      opacity: 0.4;
    }

    /* ===== NOW PLAYING (HERO) ===== */
    .now-playing-hero {
      position: relative;
      background: rgba(201,168,76,0.06);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 22px;
      padding: 2rem 2.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 0 40px rgba(201,168,76,0.08);
      animation: heroPulse 3s ease-in-out infinite alternate;
      overflow: hidden;
    }
    .now-playing-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.03), transparent);
      animation: heroSheen 5s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes heroPulse {
      from { box-shadow: 0 0 30px rgba(201,168,76,0.06); }
      to { box-shadow: 0 0 50px rgba(201,168,76,0.14); }
    }
    @keyframes heroSheen {
      0%, 100% { transform: translateX(-100%); }
      50% { transform: translateX(100%); }
    }

    .hero-label {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.6rem;
    }

    .live-equalizer {
      display: inline-flex; align-items: flex-end; gap: 3px; height: 18px;
    }
    .live-equalizer .eq-bar {
      width: 3px; background: var(--gold); border-radius: 2px;
      animation: eqBounce 0.7s ease-in-out infinite alternate;
    }
    .live-equalizer .eq-bar:nth-child(1) { height: 7px; animation-delay: 0s; }
    .live-equalizer .eq-bar:nth-child(2) { height: 16px; animation-delay: 0.15s; }
    .live-equalizer .eq-bar:nth-child(3) { height: 9px; animation-delay: 0.3s; }
    .live-equalizer .eq-bar:nth-child(4) { height: 14px; animation-delay: 0.1s; }
    @keyframes eqBounce { 0% { transform: scaleY(0.4); } 100% { transform: scaleY(1); } }

    .hero-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 700;
      line-height: 1.1;
      color: var(--text-primary);
      margin-bottom: 0.4rem;
      word-break: break-word;
    }
    .hero-artist {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: clamp(1.1rem, 2.2vw, 1.6rem);
      font-weight: 400;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
    }
    .hero-votes {
      position: absolute;
      top: 1.5rem; right: 1.8rem;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--rose);
      padding: 0.5rem 1rem;
      border-radius: 18px;
      background: rgba(212,160,160,0.1);
      border: 1px solid rgba(212,160,160,0.2);
      backdrop-filter: blur(6px);
    }

    /* ===== SETLIST GRID ===== */
    .setlist-list {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 1rem;
    }

    .setlist-item {
      display: flex; align-items: center; gap: 1.2rem;
      padding: 1.2rem 1.4rem;
      border-radius: 16px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      transition: all 0.3s ease;
      position: relative;
      min-height: 88px;
      backdrop-filter: blur(6px);
    }
    .setlist-item:hover {
      background: rgba(201,168,76,0.06);
      border-color: rgba(201,168,76,0.15);
      transform: translateY(-2px);
    }
    .setlist-item.played {
      opacity: 0.35;
      background: rgba(255,255,255,0.01);
    }
    .setlist-item.played .item-title { text-decoration: line-through; }

    .item-pos {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700;
      font-size: 2.2rem;
      min-width: 3.2rem;
      text-align: center;
      color: rgba(201,168,76,0.5);
    }

    .item-info { flex: 1; min-width: 0; }
    .item-title {
      font-weight: 600;
      font-size: 1.35rem;
      line-height: 1.25;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .item-artist {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-top: 0.2rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .item-votes {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--rose);
      white-space: nowrap;
      padding: 0.45rem 0.85rem;
      border-radius: 16px;
      background: rgba(212,160,160,0.08);
      border: 1px solid rgba(212,160,160,0.15);
    }

    /* ===== UPCOMING SECTION HEADER ===== */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 0.5rem 0 1.2rem;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(201,168,76,0.3), transparent);
    }

    /* ===== QR CODE OVERLAY ===== */
    .qr-overlay {
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      z-index: 90;
      background: rgba(17, 17, 17, 0.94);
      border: 1px solid rgba(201, 168, 76, 0.25);
      border-radius: 16px;
      padding: 1rem 1rem 0.8rem;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
      transition: all 0.3s ease;
    }
    .qr-overlay:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(0,0,0,0.6);
      border-color: var(--gold);
    }
    .qr-overlay .qr-code {
      width: 150px; height: 150px;
      background: #fff;
      padding: 8px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .qr-overlay .qr-code img,
    .qr-overlay .qr-code canvas {
      display: block; width: 100%; height: 100%;
    }
    .qr-overlay .qr-label {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 0.7rem;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      header { padding: 1.5rem 1rem 0.5rem; }
      .meta-row { gap: 0.8rem; font-size: 0.85rem; margin-top: 0.6rem; }
      .meta-row strong { font-size: 1rem; }

      main { padding: 1rem 0.8rem 6rem; }

      .now-playing-hero {
        padding: 1.4rem 1.2rem 1.2rem;
        margin-bottom: 1.2rem;
        border-radius: 18px;
      }
      .hero-votes {
        position: static;
        display: inline-block;
        margin-top: 0.8rem;
        font-size: 0.85rem;
        padding: 0.35rem 0.7rem;
      }

      .setlist-list {
        grid-template-columns: 1fr;
        gap: 0.6rem;
      }
      .setlist-item {
        padding: 0.85rem 1rem;
        gap: 0.8rem;
        min-height: 70px;
        border-radius: 14px;
      }
      .item-pos { font-size: 1.5rem; min-width: 2.2rem; }
      .item-title { font-size: 1.05rem; }
      .item-artist { font-size: 0.85rem; }
      .item-votes { font-size: 0.78rem; padding: 0.3rem 0.6rem; }

      .section-divider { font-size: 0.7rem; margin: 0.3rem 0 0.8rem; }

      .qr-overlay {
        bottom: 0.6rem; right: 0.6rem;
        padding: 0.55rem 0.7rem;
      }
      .qr-overlay .qr-code { width: 70px; height: 70px; padding: 4px; }
      .qr-overlay .qr-label { font-size: 0.5rem; margin-top: 0.4rem; }
    }

    /* Entrance animations */
    .now-playing-hero,
    .setlist-item {
      opacity: 0;
      animation: fadeIn 0.5s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <div class="bg-image" aria-hidden="true"></div>

  <header>
    <h1 class="logo">Setlist Vanavond</h1>
    <p class="subtitle">Live &middot; Wat de band speelt</p>
    <div class="meta-row" id="metaRow">
      <span><strong id="metaRemaining">0</strong>nog te spelen</span>
      <span class="meta-divider"></span>
      <span><strong id="metaTotal">0</strong>nummers totaal</span>
      <span class="meta-divider"></span>
      <span><strong id="metaPlayed">0</strong>al gespeeld</span>
    </div>
  </header>

  <main>
    <div id="setlistContent">
      <div class="setlist-empty">
        <span class="empty-icon">&#127925;</span>
        De setlist wordt nog samengesteld...
      </div>
    </div>
  </main>

  <!-- QR CODE OVERLAY -->
  <div class="qr-overlay" title="Scan om mee te stemmen">
    <div class="qr-code" id="qrCode"></div>
    <div class="qr-label">Scan om te stemmen</div>
  </div>

  <script>
    const setlistContent = document.getElementById('setlistContent');
    const metaRemaining = document.getElementById('metaRemaining');
    const metaTotal = document.getElementById('metaTotal');
    const metaPlayed = document.getElementById('metaPlayed');

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    async function fetchSetlist() {
      try {
        const res = await fetch('/api/setlist');
        const data = await res.json();
        renderSetlist(data);
      } catch (e) { console.error('Failed to fetch setlist:', e); }
    }

    function renderSetlist(data) {
      const songs = data.songs || [];
      const nowPlayingId = data.nowPlayingId;

      const total = songs.length;
      const played = songs.filter(s => s.played).length;
      const remaining = total - played;
      metaRemaining.textContent = remaining;
      metaTotal.textContent = total;
      metaPlayed.textContent = played;

      if (songs.length === 0) {
        setlistContent.innerHTML = `
          <div class="setlist-empty">
            <span class="empty-icon">&#127925;</span>
            De setlist wordt nog samengesteld...
          </div>`;
        return;
      }

      const nowPlayingSong = nowPlayingId ? songs.find(s => s.id === nowPlayingId) : null;
      const others = songs.filter(s => !nowPlayingSong || s.id !== nowPlayingSong.id);

      let html = '';

      if (nowPlayingSong) {
        const idx = songs.findIndex(s => s.id === nowPlayingSong.id);
        html += `
          <div class="now-playing-hero">
            <div class="hero-label">
              <span class="live-equalizer">
                <span class="eq-bar"></span><span class="eq-bar"></span>
                <span class="eq-bar"></span><span class="eq-bar"></span>
              </span>
              Nu Live &middot; #${String(idx + 1).padStart(2, '0')}
            </div>
            <div class="hero-title">${esc(nowPlayingSong.title)}</div>
            <div class="hero-artist">${esc(nowPlayingSong.artist)}</div>
            <div class="hero-votes">${nowPlayingSong.votes} &#9829;</div>
          </div>
        `;
      }

      if (others.length > 0) {
        html += `<div class="section-divider">${nowPlayingSong ? 'Up Next' : 'Setlist'}</div>`;
        html += '<ul class="setlist-list">';
        html += others.map(song => {
          const idx = songs.findIndex(s => s.id === song.id);
          const cls = ['setlist-item'];
          if (song.played) cls.push('played');
          return `
            <li class="${cls.join(' ')}">
              <span class="item-pos">${String(idx + 1).padStart(2, '0')}</span>
              <div class="item-info">
                <div class="item-title">${esc(song.title)}</div>
                <div class="item-artist">${esc(song.artist)}</div>
              </div>
              <span class="item-votes">${song.votes} &#9829;</span>
            </li>
          `;
        }).join('');
        html += '</ul>';
      }

      setlistContent.innerHTML = html;
    }

    // ===== SSE: REAL-TIME UPDATES =====
    function connectSSE() {
      const source = new EventSource('/api/events');
      source.addEventListener('setlistUpdated', () => fetchSetlist());
      source.addEventListener('nowPlayingUpdated', () => fetchSetlist());
      source.addEventListener('vote', () => fetchSetlist());
      source.addEventListener('songPlayed', () => fetchSetlist());
      source.addEventListener('votesReset', () => fetchSetlist());
      source.onerror = () => {
        source.close();
        setTimeout(connectSSE, 3000);
      };
    }

    // ===== QR CODE =====
    (function initQR() {
      const el = document.getElementById('qrCode');
      if (!el || typeof QRCode === 'undefined') return;
      // QR points to the main voting page (not this screen)
      const url = window.location.origin + '/';
      try {
        new QRCode(el, {
          text: url,
          width: 300,
          height: 300,
          colorDark: '#0a0a0a',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.M,
        });
      } catch (e) { console.error('QR error:', e); }
    })();

    // ===== INIT =====
    fetchSetlist();
    connectSSE();
    setInterval(fetchSetlist, 8000);
  </script>
</body>
</html>
